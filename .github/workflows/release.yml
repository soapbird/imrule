name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

  HOMEBREW_TAP_REPO: homebrew-tap
jobs:
  build:
    name: Build release binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist/imrule-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/imrule dist/imrule-${{ matrix.target }}/
          cp README.md LICENSE dist/imrule-${{ matrix.target }}/ 2>/dev/null || true
          cd dist
          tar czf imrule-${{ matrix.target }}.tar.gz imrule-${{ matrix.target }}
          sha256sum imrule-${{ matrix.target }}.tar.gz > imrule-${{ matrix.target }}.tar.gz.sha256

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/imrule-${{ matrix.target }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/imrule.exe dist/imrule-${{ matrix.target }}/
          Copy-Item README.md dist/imrule-${{ matrix.target }}/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE dist/imrule-${{ matrix.target }}/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/imrule-${{ matrix.target }}/* -DestinationPath dist/imrule-${{ matrix.target }}.zip
          $hash = Get-FileHash dist/imrule-${{ matrix.target }}.zip -Algorithm SHA256
          $hash.Hash | Out-File -FilePath dist/imrule-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: imrule-${{ matrix.target }}
          path: dist/imrule-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    env:
      HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Install git-cliff
        run: cargo install git-cliff --version 2.12.0 --locked

      - name: Generate changelog
        id: changelog
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          git cliff --strip header --current >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          files: dist/*

      - name: Checkout Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        uses: actions/checkout@v6
        with:
          repository: ${{ github.repository_owner }}/${{ env.HOMEBREW_TAP_REPO }}
          path: homebrew-tap
          token: ${{ env.HOMEBREW_TAP_TOKEN }}
      - name: Generate Homebrew formula
        if: env.HOMEBREW_TAP_TOKEN != ''
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          VERSION="${VERSION#v}"
          REPO="${GITHUB_REPOSITORY}"
          RELEASE_BASE="https://github.com/${REPO}/releases/download/v${VERSION}"

          mac_arm_sha="$(cut -d ' ' -f1 dist/imrule-aarch64-apple-darwin.tar.gz.sha256)"
          mac_intel_sha="$(cut -d ' ' -f1 dist/imrule-x86_64-apple-darwin.tar.gz.sha256)"
          linux_intel_sha="$(cut -d ' ' -f1 dist/imrule-x86_64-unknown-linux-gnu.tar.gz.sha256)"

          mkdir -p homebrew-tap/Formula
          cat > homebrew-tap/Formula/imrule.rb <<EOF
          class Imrule < Formula
            desc "Apply the same rules to all coding agents"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${RELEASE_BASE}/imrule-aarch64-apple-darwin.tar.gz"
                sha256 "${mac_arm_sha}"
              else
                url "${RELEASE_BASE}/imrule-x86_64-apple-darwin.tar.gz"
                sha256 "${mac_intel_sha}"
              end
            end

            on_linux do
              if Hardware::CPU.intel?
                url "${RELEASE_BASE}/imrule-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${linux_intel_sha}"
              end
            end

            def install
              bin.install "imrule"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/imrule --version")
            end
          end
          EOF

      - name: Publish Homebrew tap
        if: env.HOMEBREW_TAP_TOKEN != ''
        working-directory: homebrew-tap
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/imrule.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula is already up to date."
          else
            git commit -m "Update imrule formula to ${VERSION}"
            git push
          fi
