name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build release binaries
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: matrix.archive == 'tar.gz'
        run: |
          mkdir -p dist/imrule-${{ matrix.target }}
          cp target/${{ matrix.target }}/release/imrule dist/imrule-${{ matrix.target }}/
          cp README.md LICENSE dist/imrule-${{ matrix.target }}/ 2>/dev/null || true
          cd dist
          tar czf imrule-${{ matrix.target }}.tar.gz imrule-${{ matrix.target }}
          sha256sum imrule-${{ matrix.target }}.tar.gz > imrule-${{ matrix.target }}.tar.gz.sha256

      - name: Package binary (windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/imrule-${{ matrix.target }} | Out-Null
          Copy-Item target/${{ matrix.target }}/release/imrule.exe dist/imrule-${{ matrix.target }}/
          Copy-Item README.md dist/imrule-${{ matrix.target }}/ -ErrorAction SilentlyContinue
          Copy-Item LICENSE dist/imrule-${{ matrix.target }}/ -ErrorAction SilentlyContinue
          Compress-Archive -Path dist/imrule-${{ matrix.target }}/* -DestinationPath dist/imrule-${{ matrix.target }}.zip
          $hash = Get-FileHash dist/imrule-${{ matrix.target }}.zip -Algorithm SHA256
          $hash.Hash | Out-File -FilePath dist/imrule-${{ matrix.target }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: imrule-${{ matrix.target }}
          path: dist/imrule-${{ matrix.target }}.*
          if-no-files-found: error

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.85"

      - name: Install git-cliff
        run: cargo install git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "body<<$EOF" >> "$GITHUB_OUTPUT"
          git cliff --strip header --current >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          draft: true
          files: dist/*
